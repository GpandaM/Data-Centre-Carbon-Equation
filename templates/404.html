<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 Not Found</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-800">
    <div class="min-h-screen flex items-center justify-center">
        <div class="bg-green-50 p-10 rounded-lg shadow-md text-center max-w-md w-full">
            <h1 class="text-6xl font-bold text-green-600">404</h1>
            <p class="mt-4 text-lg font-semibold text-green-700">Page Not Found</p>
            <p class="mt-2 text-gray-600">Sorry, the page you're looking for doesn't exist.</p>
            <a href="/" class="mt-6 inline-block bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 transition">Go Home</a>
        </div>
    </div>
</body>
</html>
